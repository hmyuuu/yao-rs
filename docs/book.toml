[book]
title = "yao-rs"
description = "Quantum circuit description and tensor network export"
authors = ["GiggleLiu", "Roger-luo"]
language = "en"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "coal"
mathjax-support = true
git-repository-url = "https://github.com/QuantumBFS/yao-rs"
edit-url-template = "https://github.com/QuantumBFS/yao-rs/edit/main/docs/src/{path}"
additional-css = ["src/static/module-graph.css"]
additional-js = ["src/static/module-graph.js"]

[output.html.search]
enable = true
